<!DOCTYPE html>
<html>
<head>
    <title>My JS Webpage</title>
</head>
<body>
    <script>
        let calculator = {
            read() {
                this.a = +prompt("Input a", 0);
                this.b = +prompt("Input b", 0);
            },

            sum() {
                return this.a + this.b;
            },

            mul() {
                return this.a * this.b;
            },
        };

        calculator.read();
        alert( calculator.sum() );
        alert( calculator.mul() );
    </script>
</body>
</html>
