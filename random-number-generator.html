<!DOCTYPE html>
<html>
<head>
    <title>My JS Webpage</title>
</head>
<body>
    <script>
        function random(min, max) {
            return ((Math.random() * (max - min)) + min);
        }

        alert(random(1, 5));

        function randomInteger(min, max) {
            return (Math.floor(Math.random() * (max + 1 - min)) + min);
        }

        alert(randomInteger(2, 5));
    </script>
</body>
</html>
